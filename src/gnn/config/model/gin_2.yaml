# GIN (Graph Isomorphism Network) - Variant 2
model_type: 'gin'
description: 'Graph Isomorphism Network - A Graph Isomorphism Network model that uses node features to learn graph structure. Uses a lightweight MLP inside GIN to learn node representations.'

model_config:
  in_channels: 4
  hidden_channels: 32
  global_dim: 7
  out_dim: 1
  num_layers: 3
  use_edge_attr: true
  use_global_features: false
  coord_embed_method: 'mlp' # 'mlp', 'sinusoidal', 'distance_based', 'spherical'
  pooling_method: 'max'
  activation_function: 'leaky_relu'
  dropout: 0.2
  edge_dim: 2
  edge_embedding_dim: 32
  user_global_coord_embedder: false
  
  # GIN specific
  special_config:
    eps: 0.0
    train_eps: true
