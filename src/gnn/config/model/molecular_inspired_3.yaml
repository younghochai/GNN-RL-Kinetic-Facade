# Molecular Graph Inspired GNN - Variant 3
model_type: 'molecular_inspired'
description: 'Molecular Graph Inspired GNN - A GNN model specifically designed for molecular graphs that leverages 3D spatial information like distances and angles between atoms, along with chemical features like bond types and atom properties'

model_config:
  in_channels: 4
  hidden_channels: 128
  global_dim: 7
  out_dim: 1
  num_layers: 4
  use_edge_attr: true
  use_global_features: false
  coord_embed_method: 'distance_based'
  pooling_method: 'add'
  activation_function: 'gelu'
  dropout: 0.0
  edge_dim: 2
  edge_embedding_dim: 8
  user_global_coord_embedder: false
  
  special_config:
    eps: 0.0
    train_eps: true