# GIN (Graph Isomorphism Network) with Global Coord Embedder
model_type: 'gin'
description: 'Graph Isomorphism Network - A Graph Isomorphism Network model that uses node features to learn graph structure. Uses a lightweight MLP inside GIN to learn node representations.'

model_config:
  in_channels: 4
  hidden_channels: 64
  global_dim: 7
  out_dim: 1
  num_layers: 2
  use_edge_attr: false
  use_global_features: true
  coord_embed_method: 'spherical' # 'mlp', 'sinusoidal', 'distance_based', 'spherical'
  pooling_method: 'mean'
  activation_function: 'relu'
  dropout: 0.1
  edge_dim: 2
  edge_embedding_dim: 16
  user_global_coord_embedder: true
  
  # GIN specific
  special_config:
    eps: 0.0
    train_eps: true
