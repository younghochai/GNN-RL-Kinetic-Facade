# GCN (Graph Convolutional Network) - Variant 3
model_type: 'gcn'
description: 'Graph Convolutional Network - A Graph Convolutional Network model that uses graph convolution to learn graph structure.'

model_config:
  # common settings
  in_channels: 4
  hidden_channels: 64
  global_dim: 7
  out_dim: 1
  num_layers: 4
  use_edge_attr: false
  use_global_features: false
  coord_embed_method: 'sinusoidal' # 'mlp', 'sinusoidal', 'distance_based', 'spherical'
  pooling_method: 'add'
  activation_function: 'gelu'
  dropout: 0.0
  edge_dim: 2
  edge_embedding_dim: 8
  user_global_coord_embedder: false
  
  
  # GCN specific
  special_config:
    normalize: true  # normalization
    add_self_loops: true  # self-loop
    bias: true  # bias
