# GIN (Graph Isomorphism Network) - Variant 4
model_type: 'gin'
description: 'Graph Isomorphism Network - A Graph Isomorphism Network model that uses node features to learn graph structure. Uses a lightweight MLP inside GIN to learn node representations.'

model_config:
  in_channels: 4
  hidden_channels: 96
  global_dim: 7
  out_dim: 1
  num_layers: 2
  use_edge_attr: true
  use_global_features: true
  coord_embed_method: 'distance_based' # 'mlp', 'sinusoidal', 'distance_based', 'spherical'
  pooling_method: 'mean'
  activation_function: 'relu'
  dropout: 0.3
  edge_dim: 2
  edge_embedding_dim: 64
  user_global_coord_embedder: false
  
  # GIN specific
  special_config:
    eps: 0.0
    train_eps: true
