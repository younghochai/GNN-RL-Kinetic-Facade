# GAT with Edge Features - Variant 3 with Global Coord Embedder
model_type: 'gat_edge'
description: 'GAT with Edge Features - A Graph Attention Network model that incorporates edge features into the attention mechanism. Uses multi-head attention to learn node representations while considering edge attributes, enabling the model to capture both node and edge information in the graph structure.'

model_config:
  in_channels: 4
  hidden_channels: 128
  global_dim: 7
  out_dim: 1
  num_layers: 4
  use_edge_attr: true
  use_global_features: true
  coord_embed_method: 'sinusoidal'
  pooling_method: 'add'
  activation_function: 'gelu'
  dropout: 0.0
  edge_dim: 2
  edge_embedding_dim: 8
  user_global_coord_embedder: true
  
  # GAT Edge specific
  special_config:
    heads: 8  # attention head
    concat: true  # head concat
    negative_slope: 0.2
    add_self_loops: true
    edge_dim: 2
    bias: true  # bias
