# GAT (Graph Attention Network) - Variant 2
model_type: 'gat'
description: 'Graph Attention Network - A Graph Attention Network model that uses an attention mechanism to learn graph structure. Uses multi-head attention to learn node representations while considering edge attributes, enabling the model to capture both node and edge information in the graph structure.'

model_config:
  in_channels: 4
  hidden_channels: 32
  global_dim: 7
  out_dim: 1
  num_layers: 2
  use_edge_attr: false
  use_global_features: false
  coord_embed_method: 'mlp'
  pooling_method: 'max'
  activation_function: 'relu'
  dropout: 0.2
  edge_dim: 2
  edge_embedding_dim: 32
  user_global_coord_embedder: false
  
  
  # GAT specific
  special_config:
    heads: 2  # attention head
    concat: true
    negative_slope: 0.2
    add_self_loops: true
    bias: true
