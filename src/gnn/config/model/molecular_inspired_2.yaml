# Molecular Graph Inspired GNN - Variant 2
model_type: 'molecular_inspired'
description: 'Molecular Graph Inspired GNN - A GNN model specifically designed for molecular graphs that leverages 3D spatial information like distances and angles between atoms, along with chemical features like bond types and atom properties'

model_config:
  in_channels: 4
  hidden_channels: 32
  global_dim: 7
  out_dim: 1
  num_layers: 2
  use_edge_attr: false
  use_global_features: true
  coord_embed_method: 'sinusoidal'
  pooling_method: 'max'
  activation_function: 'leaky_relu'
  dropout: 0.2
  edge_dim: 2
  edge_embedding_dim: 32
  user_global_coord_embedder: false
  
  special_config:
    eps: 0.0
    train_eps: true