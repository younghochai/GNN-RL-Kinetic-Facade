# GraphSAGE - Variant 2
model_type: 'sage'
description: 'GraphSAGE - A GraphSAGE model that uses sampling-based graph learning.'

model_config:
  in_channels: 4
  hidden_channels: 32
  global_dim: 7
  out_dim: 1
  num_layers: 2
  use_edge_attr: false
  use_global_features: false
  coord_embed_method: 'mlp'
  pooling_method: 'max'
  activation_function: 'relu'
  dropout: 0.2
  edge_dim: 2
  edge_embedding_dim: 32
  user_global_coord_embedder: false
  

  # GraphSAGE specific
  special_config:
    normalize: true  # normalization
    root_weight: true  # root weight
    bias: true  # bias
    # Sampling size (each layer)
    sample_sizes: [5, 3]  # sampling size for each layer
