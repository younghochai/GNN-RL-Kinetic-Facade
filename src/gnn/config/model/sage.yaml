# GraphSAGE
model_type: 'sage'
description: 'GraphSAGE - A GraphSAGE model that uses sampling-based graph learning.'

model_config:
  in_channels: 4
  hidden_channels: 64
  global_dim: 7
  out_dim: 1
  num_layers: 3
  use_edge_attr: true
  use_global_features: true
  coord_embed_method: 'mlp'
  pooling_method: 'mean'
  activation_function: 'relu'
  dropout: 0.1
  edge_dim: 2
  edge_embedding_dim: 16
  user_global_coord_embedder: false
  

  # GraphSAGE specific
  special_config:
    normalize: true  # normalization
    root_weight: true  # root weight
    bias: true  # bias
    # Sampling size (each layer)
    sample_sizes: [10, 5, 2]  # sampling size for each layer
